name: MCTennis

permissions:
  contents: write

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main, development ]
  pull_request:
    branches: [ main, development ]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:

  # This workflow contains a single job called "build"
  Build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-java@v1
        with:
          java-version: '8'
      - name: Install Libraries
        run: |
          sudo apt-get install -y dos2unix 

      - name: Patch BlockBall to MCTennis
        run: |
          cp ./patch/main.patch ./blockball/main.patch 
          cp ./patch/rename.ps1 ./blockball/rename.ps1
          cd blockball
          dos2unix main.patch 
          git apply main.patch 
          pwsh rename.ps1
          cd -

      - name: Build Java Application
        env:
          SHYNIXN_MCUTILS_REPOSITORY_2026: ${{ secrets.SHYNIXN_MCUTILS_REPOSITORY_2026 }}
        run: |
          cd blockball
          chmod +x gradlew
          ./gradlew build pluginJars
          echo "RELEASE_VERSION=$(./gradlew -q printVersion)" >> $GITHUB_ENV
          cd -

      - name: Create Geyser Customizations
        if: "contains(github.event.head_commit.message, '--release') && contains(github.ref, 'main')"
        env:
          GEYSER_PASSWORD: ${{ secrets.GEYSER_PASSWORD }}
        run: |
          pwd && ls -a
          7z x patch/MCTennis-GeyserMC.7z -p${{ env.GEYSER_PASSWORD }}           

      - name: Rename Artifacts
        if: "contains(github.event.head_commit.message, '--release') && contains(github.ref, 'main')"
        run: |
          cp ./blockball/build/libs/mctennis-${{ env.RELEASE_VERSION }}-26.1.0-latest-premium-folia.jar ./MCTennis-26.1.0-latest-Premium-Folia.jar
          cp ./blockball/build/libs/mctennis-${{ env.RELEASE_VERSION }}-1.17.0-1.21.11-premium-folia.jar ./MCTennis-1.17.0-1.21.11-Premium-Folia.jar
          cp ./blockball/build/libs/mctennis-${{ env.RELEASE_VERSION }}-1.8.8-1.16.5-premium.jar ./MCTennis-1.8.8-1.16.5-Premium.jar
          cp ./blockball/build/libs/mctennis-${{ env.RELEASE_VERSION }}-1.17.0-1.21.11-premium.jar ./MCTennis-1.17.0-1.21.11-Premium.jar
          cp ./blockball/build/libs/mctennis-${{ env.RELEASE_VERSION }}-26.1.0-latest-premium.jar ./MCTennis-26.1.0-latest-Premium.jar

      - name: Parse Changelog
        if: "contains(github.event.head_commit.message, '--release') && contains(github.ref, 'main')"
        run: |
          VERSION=${{ env.RELEASE_VERSION }}
          CHANGES=$(awk '/^---/{exit} /^## Release /{found=1; next} found{print}' CHANGELOG.md)
          FOOTER=$(cat docs/footer-github.md)
          FOOTER="${FOOTER//<version>/$VERSION}"
          PATREON_FOOTER_BASIC=$(cat docs/footer-patreon-basic.md)
          PATREON_FOOTER_ELITE=$(cat docs/footer-patreon-elite.md)
          BODY="$CHANGES"$'\n'"$FOOTER"
          PATREON_BODY_BASIC="$CHANGES"$'\n'"$PATREON_FOOTER_BASIC"
          PATREON_BODY_ELITE="$CHANGES"$'\n'"$PATREON_FOOTER_ELITE"
          echo "RELEASE_BODY<<EOF" >> $GITHUB_ENV
          echo "$BODY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "RELEASE_PATREON_BASIC<<EOF" >> $GITHUB_ENV
          echo "$PATREON_BODY_BASIC" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          echo "RELEASE_PATREON_ELITE<<EOF" >> $GITHUB_ENV
          echo "$PATREON_BODY_ELITE" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Github Release
        if: "contains(github.event.head_commit.message, '--release') && contains(github.ref, 'main')"
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          body: ${{ env.RELEASE_BODY }}
          tag_name: ${{ env.RELEASE_VERSION }}
          release_name: Release ${{ env.RELEASE_VERSION }}
          draft: true
          prerelease: false

      - name: Upload MCTennis-Free.jar
        if: "contains(github.event.head_commit.message, '--release') && contains(github.ref, 'main')"
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /home/runner/work/MCTennis/MCTennis/blockball/build/libs/mctennis-${{ env.RELEASE_VERSION }}-26.1.0-latest-free.jar
          asset_name: MCTennis.jar
          asset_content_type: application/jar

      - name: Publish Patreon Release
        if: "contains(github.event.head_commit.message, '--release') && contains(github.ref, 'main')"
        env:
          PAPOA_API_KEY: ${{ secrets.PAPOA_API_KEY }}
          PAPOA_PASSWORD: ${{ secrets.PAPOA_PASSWORD }}
        run: |
          wget -O papoa https://github.com/Shynixn/PatreonPostApi/releases/latest/download/papoa-linux-x64
          chmod +x papoa
          ./papoa post create \
            --title "MCTennis for Folia v${{ env.RELEASE_VERSION }} (1.8.9-26.2)" \
            --content "$RELEASE_PATREON_ELITE" \
            --content-format text/markdown \
            --tier-name "Elite" \
            --tier-name "Legendary" \
            --collection-name "MCTennis" \
            --tag mctennis \
            --tag minecraft \
            --tag plugin \
            --ttl-days 1 \
            --file ./MCTennis-26.1.0-latest-Premium-Folia.jar \
            --file ./MCTennis-1.17.0-1.21.11-Premium-Folia.jar \
            --file /home/runner/work/MCTennis/MCTennis/docs/title.png \
            --photo-attachment-file-name "title.png" \
            --attachment-file-name "MCTennis-26.1.0-latest-Premium-Folia.jar" \
            --attachment-file-name "MCTennis-1.17.0-1.21.11-Premium-Folia.jar" \
            --password "$PAPOA_PASSWORD"
          ./papoa post create \
            --title "MCTennis v${{ env.RELEASE_VERSION }} (1.8.9-26.2)" \
            --content "$RELEASE_PATREON_BASIC" \
            --content-format text/markdown \
            --tier-name "Basic" \
            --tier-name "Elite" \
            --tier-name "Legendary" \
            --collection-name "MCTennis" \
            --tag mctennis \
            --tag minecraft \
            --tag plugin \
            --ttl-days 1 \
            --file ./MCTennis-1.8.8-1.16.5-Premium.jar \
            --file ./MCTennis-1.17.0-1.21.11-Premium.jar \
            --file ./MCTennis-26.1.0-latest-Premium.jar \
            --file ./MCTennis-GeyserMC.zip \
            --file /home/runner/work/MCTennis/MCTennis/docs/title.png \
            --photo-attachment-file-name "title.png" \
            --attachment-file-name "MCTennis-1.8.8-1.16.5-Premium.jar" \
            --attachment-file-name "MCTennis-1.17.0-1.21.11-Premium.jar" \
            --attachment-file-name "MCTennis-26.1.0-latest-Premium.jar" \
            --attachment-file-name "MCTennis-GeyserMC.zip" \
            --password "$PAPOA_PASSWORD"

  Wiki:
    runs-on: ubuntu-latest
    if: "contains(github.ref, 'main')"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-java@v1
        with:
          java-version: '8'
      - uses: actions/setup-python@v2
        with:
          python-version: '3.x'
          architecture: 'x64'

      - name: Install Libraries
        run: |
          sudo apt-get install -y dos2unix
          sudo apt-get install -y mkdocs
          pip install mkdocs-material
          pip install Pygments

      - name: Patch BlockBall to MCTennis
        run: |
          cp ./patch/main.patch ./blockball/main.patch 
          cp ./patch/rename.ps1 ./blockball/rename.ps1
          cp -rf ./patch/field.png ./blockball/docs/wiki/docs/assets/arena7.png
          cp -rf ./patch/red_area.png ./blockball/docs/wiki/docs/assets/arena8.png
          cp -rf ./patch/blue_area.png ./blockball/docs/wiki/docs/assets/blue_area.png
          cd blockball
          dos2unix main.patch 
          git apply main.patch 
          pwsh rename.ps1
          cd -

      - name: Build Documentation
        run: |
          rm -rf ./.git
          cd blockball/docs/wiki  
          mkdocs build
          cd /home/runner/work/MCTennis/MCTennis
          mkdir -p ./tmp && cd ./tmp
          git clone --verbose https://Shynixn:${{ secrets.GITHUB_TOKEN }}@github.com/Shynixn/MCTennis.git && cd ./MCTennis      
          echo "Checking contents" && ls -a && pwd
          git config --global user.email "shynixn@email.com" && git config --global user.name "Shynixn CI Actions"      
          rm -rf ./docs/wiki/site
          mkdir -p ./docs/wiki/site
          cp -rf --verbose /home/runner/work/MCTennis/MCTennis/blockball/docs/wiki/site/* /home/runner/work/MCTennis/MCTennis/tmp/MCTennis/docs/wiki/site/
          pwd && ls -a
          git add --verbose .   
          git commit --verbose --message "Automatic CI Documentation." | echo "Nothing to commit"
          git push --verbose --quiet https://Shynixn:${{ secrets.GITHUB_TOKEN }}@github.com/Shynixn/MCTennis.git HEAD:main | echo "Nothing to push"
